<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IvanClicker - Payment Success</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #eee;
      text-align: center;
    }
    .container {
      padding: 2rem;
      max-width: 400px;
    }
    h1 { color: #4ade80; font-size: 1.5rem; }
    p { color: #aaa; font-size: 1rem; line-height: 1.5; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Payment Successful!</h1>
    <p>Returning to IvanClicker...</p>
    <p id="fallback" style="display:none;">
      Not opening automatically? <a id="deep-link" href="#">Tap here</a>
    </p>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('session_id');

    if (sessionId) {
      // Redirect to app via deep link
      window.location.href = 'ivanclicker://payment-success?session_id=' + encodeURIComponent(sessionId);
    }

    // Show fallback link after 3 seconds if app didn't open
    setTimeout(function() {
      var fallback = document.getElementById('fallback');
      var deepLink = document.getElementById('deep-link');
      if (fallback && deepLink) {
        fallback.style.display = 'block';
        deepLink.href = 'ivanclicker://payment-success?session_id=' + encodeURIComponent(sessionId || '');
      }
    }, 3000);
  </script>
</body>
</html>
